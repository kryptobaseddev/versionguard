name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - name: Validate with versionguard (dogfood)
        run: node dist/cli.js validate

      - name: Check for pending changesets
        id: has_changesets
        run: |
          # Count .md files in .changeset/ excluding README.md and config.json
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release PR or Publish
        if: steps.has_changesets.outputs.pending == 'true'
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm publish --provenance --access public
          version: npx changeset version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Releases (from Changesets)
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          for row in $(echo "$PUBLISHED" | jq -c '.[]'); do
            NAME=$(echo "$row" | jq -r '.name')
            VERSION=$(echo "$row" | jq -r '.version')
            TAG="v${VERSION}"

            BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

            if [ -z "$BODY" ]; then
              BODY="Release ${NAME}@${VERSION}"
            fi

            gh release create "$TAG" \
              --title "v${VERSION}" \
              --notes "$BODY" \
              --target main || echo "Release $TAG already exists, skipping"
          done

      - name: Ensure GitHub Release exists for current version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          # Skip if tag/release already exists
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, nothing to do"
            exit 0
          fi

          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

          if [ -z "$BODY" ]; then
            BODY="Release @codluv/versionguard@${VERSION}"
          fi

          gh release create "$TAG" \
            --title "v${VERSION}" \
            --notes "$BODY" \
            --target main
          echo "Created release $TAG"
