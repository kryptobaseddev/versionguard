name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - "CHANGELOG.md"
      - ".cleo/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  check:
    name: Check release needed
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Decide if release is needed
        id: decide
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Check for pending changesets
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if current version is already on npm
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "${PACKAGE}@${VERSION}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" != "$VERSION" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No changesets and version already published — skipping release"
          echo "should_release=false" >> "$GITHUB_OUTPUT"

  release:
    name: Version & Publish
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      - name: Validate with versionguard (dogfood)
        run: |
          node dist/cli.js hooks install
          node dist/cli.js validate
          node dist/cli.js hooks uninstall

      - name: Check for pending changesets
        id: has_changesets
        run: |
          COUNT=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 0 ]; then
            echo "pending=true" >> "$GITHUB_OUTPUT"
          else
            echo "pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release PR or Publish (via Changesets)
        if: steps.has_changesets.outputs.pending == 'true'
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm publish --provenance --access public
          version: npx changeset version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (if not via Changesets)
        if: steps.has_changesets.outputs.pending == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE=$(node -p "require('./package.json').name")
          PUBLISHED=$(npm view "${PACKAGE}@${VERSION}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "${PACKAGE}@${VERSION} already published to npm, skipping"
          else
            echo "Publishing ${PACKAGE}@${VERSION} to npm..."
            npm publish --provenance --access public
            echo "Published ${PACKAGE}@${VERSION}"
          fi

      - name: Ensure GitHub Release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGESET_PUBLISHED: ${{ steps.changesets.outputs.published }}
          CHANGESET_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          # If changesets just published, create releases from its output
          if [ "$CHANGESET_PUBLISHED" = "true" ]; then
            for row in $(echo "$CHANGESET_PACKAGES" | jq -c '.[]'); do
              NAME=$(echo "$row" | jq -r '.name')
              VERSION=$(echo "$row" | jq -r '.version')
              TAG="v${VERSION}"

              BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
              if [ -z "$BODY" ]; then
                BODY="Release ${NAME}@${VERSION}"
              fi

              gh release create "$TAG" \
                --title "v${VERSION}" \
                --notes "$BODY" \
                --target main || echo "Release $TAG already exists, skipping"
            done
            exit 0
          fi

          # Otherwise ensure a release exists for the current version
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists, nothing to do"
            exit 0
          fi

          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release @codluv/versionguard@${VERSION}"
          fi

          gh release create "$TAG" \
            --title "v${VERSION}" \
            --notes "$BODY" \
            --target main
          echo "Created release $TAG"
