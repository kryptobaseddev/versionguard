name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Validate with versionguard (dogfood)
        run: node dist/cli.js validate

      - name: Configure npm for OIDC publishing
        run: |
          echo "//registry.npmjs.org/:_authToken=" > ~/.npmrc
          npm config set registry https://registry.npmjs.org/

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npm publish --provenance --access public
          version: npx changeset version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Releases
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          for row in $(echo "$PUBLISHED" | jq -c '.[]'); do
            NAME=$(echo "$row" | jq -r '.name')
            VERSION=$(echo "$row" | jq -r '.version')
            TAG="v${VERSION}"

            BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)

            if [ -z "$BODY" ]; then
              BODY="Release ${NAME}@${VERSION}"
            fi

            gh release create "$TAG" \
              --title "v${VERSION}" \
              --notes "$BODY" \
              --verify-tag || echo "Release $TAG already exists, skipping"
          done
