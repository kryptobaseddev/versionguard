version: 2
updates:
  # npm dependencies — group minor+patch into single PRs
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      # typescript-eslint doesn't support TS6 yet
      - dependency-name: typescript
        update-types: [version-update:semver-major]
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions — keep workflow action versions current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
