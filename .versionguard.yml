versioning:
  type: semver

sync:
  files:
    - "README.md"
  patterns:
    - regex: '(npm install -D @codluv/versionguard@)(\S+)'
      template: '$1{{version}}'

changelog:
  enabled: true
  file: "CHANGELOG.md"
  strict: true
  requireEntry: true

git:
  hooks:
    pre-commit: true
    pre-push: true
    post-tag: true
  enforceHooks: true

ignore:
  - "node_modules/**"
  - "dist/**"
  - ".git/**"
  - "*.lock"
  - ".changeset/**"
