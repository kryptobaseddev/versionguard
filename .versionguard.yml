versioning:
  type: semver

sync:
  files:
    - "README.md"
  patterns: []

changelog:
  enabled: true
  file: "CHANGELOG.md"
  strict: true
  requireEntry: true

scan:
  enabled: true
  allowlist:
    - file: "src/__tests__/**"
      reason: "Test fixtures use example version strings"
    - file: "src/config.ts"
      reason: "Default config patterns contain version regex examples"
    - file: "src/sources/utils.ts"
      reason: "Version parsing utility examples"
    - file: "docs/**"
      reason: "Documentation contains version examples"
    - file: "coverage/**"
      reason: "Generated coverage reports"

guard:
  enabled: true

publish:
  enabled: true
  timeout: 5000

git:
  hooks:
    pre-commit: true
    pre-push: true
    post-tag: true
  enforceHooks: true

ignore:
  - "node_modules/**"
  - "dist/**"
  - ".git/**"
  - "*.lock"
  - ".changeset/**"
